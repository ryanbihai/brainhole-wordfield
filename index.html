<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦞 OceanBus 浏览器客户端 · 极简演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100dvh; display: flex; justify-content: center;
    padding: 16px;
  }
  .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }

  .header { text-align: center; padding: 20px 0 8px; }
  .header h1 { font-size: 1.4em; }
  .header p { color: #64748b; font-size: 0.85em; margin-top: 4px; }

  .card {
    background: #1e293b; border-radius: 12px; padding: 16px;
    border: 1px solid #334155;
  }
  .card-title { font-size: 0.8em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

  .status-row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.off { background: #475569; }
  .dot.on { background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .id-box {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.7em; color: #94a3b8; word-break: break-all;
    background: #0f172a; border-radius: 8px; padding: 10px;
    max-height: 60px; overflow-y: auto; margin-top: 8px;
  }

  button {
    background: #3b82f6; color: white; border: none;
    border-radius: 8px; padding: 10px 20px; font-size: 0.95em;
    cursor: pointer; font-weight: 600; width: 100%;
    transition: background 0.15s;
  }
  button:hover { background: #2563eb; }
  button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  button.danger { background: #ef4444; }
  button.danger:hover { background: #dc2626; }

  .input-row { display: flex; gap: 8px; }
  input {
    flex: 1; background: #0f172a; border: 1px solid #334155;
    border-radius: 8px; padding: 10px 14px; color: #e2e8f0;
    font-size: 0.95em; outline: none;
  }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #475569; }

  .log {
    max-height: 300px; overflow-y: auto; display: flex;
    flex-direction: column; gap: 6px;
  }
  .log-entry {
    padding: 8px 12px; border-radius: 8px; font-size: 0.85em;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .log-sent { background: #1e3a5f; align-self: flex-end; }
  .log-recv { background: #1e293b; border: 1px solid #334155; align-self: flex-start; }
  .log-sys { background: transparent; color: #64748b; font-size: 0.78em; text-align: center; }
  .log-time { font-size: 0.7em; color: #475569; margin-top: 2px; }

  .footer { text-align: center; color: #334155; font-size: 0.7em; padding: 20px 0; }
  .footer a { color: #475569; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🦞 OceanBus 浏览器客户端</h1>
    <p>L0 API 直连 · 零服务器 · P2P 消息</p>
  </div>

  <!-- 连接状态 -->
  <div class="card">
    <div class="card-title">🔌 连接状态</div>
    <div class="status-row">
      <div class="dot off" id="dot"></div>
      <span id="statusText" style="font-size:0.9em;">未连接</span>
    </div>
    <button onclick="connect()" id="btnConnect">连接 OceanBus</button>
    <div class="id-box" id="idBox" style="display:none;"></div>
  </div>

  <!-- 发消息 -->
  <div class="card">
    <div class="card-title">📤 发送消息到</div>
    <div class="input-row">
      <input type="text" id="peerInput" placeholder="目标 OpenID (对方 .id 显示的地址)">
    </div>
    <div class="input-row" style="margin-top:8px;">
      <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="btnSend" disabled style="width:auto;white-space:nowrap;">发送</button>
    </div>
  </div>

  <!-- 消息日志 -->
  <div class="card">
    <div class="card-title">📋 消息日志 <span style="font-weight:400;color:#64748b;" id="pollStatus"></span></div>
    <div class="log" id="log">
      <div class="log-entry log-sys">点击「连接 OceanBus」开始</div>
    </div>
    <button onclick="clearLog()" style="margin-top:8px;background:#334155;font-size:0.8em;">清空日志</button>
  </div>

  <!-- 解释 -->
  <div class="card" style="border-color:#2563eb40;background:#1e293bdd;">
    <div class="card-title">💡 这证明了什么</div>
    <div style="font-size:0.82em;color:#94a3b8;line-height:1.6;">
      <p>✅ 浏览器直接调用 <code style="background:#0f172a;padding:1px 5px;border-radius:3px;">ai.ihaola.com.cn/api/l0</code></p>
      <p>✅ 无需任何服务器中转 — OB L0 就是隧道</p>
      <p>✅ 页面托管在 GitHub Pages，从浏览器直接注册 OB 身份</p>
      <p>✅ 纯 <code style="background:#0f172a;padding:1px 5px;border-radius:3px;">fetch()</code> 调用，200 行 JS 搞定一切</p>
      <p style="margin-top:8px;">👉 脑洞词场的 HTML 客户端就在这个基础上扩展</p>
    </div>
  </div>

  <div class="footer">
    OceanBus Browser Client · <span id="version"></span>
  </div>
</div>

<script>
// ── OB L0 API ──
// 只在 ai.ihaola.com.cn 本域时用相对路径（零 CORS）
// 其他来源（GitHub Pages / 直连 IP / localhost）都用全 URL（L0 已开启 CORS）
const L0 = (location.hostname === 'ai.ihaola.com.cn')
  ? '/api/l0'                            // 同源 → 相对路径 (零 CORS，零延迟)
  : 'https://ai.ihaola.com.cn/api/l0';   // 跨源 → 全 URL (CORS ok)
let state = { apiKey: null, openId: null, agentId: null, pollTimer: null, lastSeq: 0 };
const $ = s => document.querySelector(s);

// ── 日志 ──
function log(text, type = 'sys') {
  const el = document.createElement('div');
  el.className = `log-entry log-${type}`;
  el.innerHTML = text + `<div class="log-time">${new Date().toLocaleTimeString()}</div>`;
  const logEl = $('#log');
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── PoW: SHA-256 Hashcash (纯 JS，兼容 HTTP 页面) ──
// 使用 forge 风格的纯 JS SHA-256，避免依赖 crypto.subtle (需要 HTTPS)
function sha256hex(input) {
  // Pure JS SHA-256 implementation (compatible with HTTP pages)
  function rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
  function ch(x, y, z) { return (x & y) ^ (~x & z); }
  function maj(x, y, z) { return (x & y) ^ (x & z) ^ (y & z); }
  function bsig0(x) { return rotr(x, 2) ^ rotr(x, 13) ^ rotr(x, 22); }
  function bsig1(x) { return rotr(x, 6) ^ rotr(x, 11) ^ rotr(x, 25); }
  function ssig0(x) { return rotr(x, 7) ^ rotr(x, 18) ^ (x >>> 3); }
  function ssig1(x) { return rotr(x, 17) ^ rotr(x, 19) ^ (x >>> 10); }

  const K = [
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ];

  const bytes = new TextEncoder().encode(input);
  const bitLen = bytes.length * 8;
  const padded = new Uint8Array(((bytes.length + 9 + 63) >>> 9) << 6);
  padded.set(bytes);
  padded[bytes.length] = 0x80;
  const view = new DataView(padded.buffer);
  view.setUint32(padded.length - 4, bitLen, false);

  let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];

  for (let i = 0; i < padded.length; i += 64) {
    const W = new Uint32Array(64);
    for (let t = 0; t < 16; t++) {
      W[t] = (padded[i + t * 4] << 24) | (padded[i + t * 4 + 1] << 16) | (padded[i + t * 4 + 2] << 8) | padded[i + t * 4 + 3];
    }
    for (let t = 16; t < 64; t++) {
      W[t] = (ssig1(W[t - 2]) + W[t - 7] + ssig0(W[t - 15]) + W[t - 16]) >>> 0;
    }
    let [a, b, c, d, e, f, g, h] = H;
    for (let t = 0; t < 64; t++) {
      const T1 = (h + bsig1(e) + ch(e, f, g) + K[t] + W[t]) >>> 0;
      const T2 = (bsig0(a) + maj(a, b, c)) >>> 0;
      h = g; g = f; f = e; e = (d + T1) >>> 0; d = c; c = b; b = a; a = (T1 + T2) >>> 0;
    }
    H = H.map((x, i) => (x + [a,b,c,d,e,f,g,h][i]) >>> 0);
  }
  return H.map(x => x.toString(16).padStart(8, '0')).join('');
}

function bitsToHex(bits) { return Math.ceil(bits / 4); }
const MAX_BIT_DIFFICULTY = 80;

async function computeHashcash(challenge, difficulty = 20) {
  if (difficulty > MAX_BIT_DIFFICULTY) throw new Error(`难度过高 (${difficulty})`);
  const hexChars = bitsToHex(difficulty);
  const prefix = '0'.repeat(hexChars);
  let solution = 0;
  const start = Date.now();
  while (true) {
    const hash = sha256hex(challenge + solution);
    if (hash.startsWith(prefix)) break;
    solution++;
    // 每 5000 次让出主线程，避免 UI 卡死
    if (solution % 5000 === 0) await new Promise(r => setTimeout(r, 0));
  }
  const elapsed = ((Date.now() - start) / 1000).toFixed(1);
  return { solution: String(solution), hash: '', elapsed };
}

// ── 连接 ──
async function connect() {
  const btn = $('#btnConnect');
  btn.disabled = true; btn.textContent = '连接中...';

  try {
    // ① 注册（可能需要 PoW）
    log('① POST /agents/register ...');
    let regRes = await fetch(`${L0}/agents/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    let regData = await regRes.json();

    // PoW 挑战
    if (regData.code === 401 && regData.data?.challenge) {
      const { nonce, difficulty } = regData.data.challenge;
      const d = difficulty || 20;
      log(`⚡ PoW 挑战: difficulty=${d} bits，计算中...`);
      btn.textContent = `PoW 计算中 (难度 ${d})...`;

      const pow = await computeHashcash(nonce, d);
      log(`✅ PoW 完成: ${pow.elapsed}s (尝试 ${pow.solution} 次)`);

      regRes = await fetch(`${L0}/agents/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ challenge: nonce, solution: pow.solution })
      });
      regData = await regRes.json();
    }

    if (regData.code !== 0) throw new Error(regData.msg || `注册失败 (code=${regData.code})`);
    state.agentId = regData.data.agent_id;
    state.apiKey = regData.data.api_key;
    log(`✅ agent_id: <b>${state.agentId.slice(0,16)}...</b>`);

    // ② 获取 OpenID
    log('② GET /agents/me ...');
    const meRes = await fetch(`${L0}/agents/me`, {
      headers: { 'Authorization': `Bearer ${state.apiKey}` }
    });
    const meData = await meRes.json();
    if (meData.code !== 0) throw new Error(meData.msg || '获取 OpenID 失败');
    state.openId = meData.data.my_openid;
    log(`✅ OpenID: <b>${state.openId.slice(0,24)}...</b>`);

    // 更新 UI
    $('#dot').className = 'dot on';
    $('#statusText').textContent = '已连接 · 身份就绪';
    $('#idBox').style.display = 'block';
    $('#idBox').innerHTML = `<span style="color:#22c55e;">●</span> OpenID:<br>${state.openId}`;
    btn.textContent = '已连接'; btn.style.background = '#22c55e';
    $('#btnSend').disabled = false;

    // ③ 开始轮询
    startPolling();
    log('③ 开始轮询消息 (每 3 秒) ...', 'sys');

  } catch (err) {
    log(`❌ 连接失败: ${err.message}`, 'sys');
    btn.disabled = false; btn.textContent = '重试连接';
  }
}

// ── 轮询 ──
function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(async () => {
    try {
      const res = await fetch(
        `${L0}/messages/sync?to_openid=${state.openId}&since_seq=${state.lastSeq}&limit=10`,
        { headers: { 'Authorization': `Bearer ${state.apiKey}` } }
      );
      const data = await res.json();
      if (data.code !== 0) return;

      const msgs = data.data?.messages || [];
      for (const msg of msgs) {
        state.lastSeq = Math.max(state.lastSeq, msg.seq_id);
        let content = msg.content;
        try { content = JSON.parse(content); } catch {}
        if (typeof content === 'object' && content.text) content = content.text;
        log(`📩 <b>${msg.from_openid.slice(0,8)}...</b>: ${String(content).slice(0,200)}`, 'recv');
      }
      if (msgs.length > 0) $('#pollStatus').textContent = `(收到 ${msgs.length} 条)`;
    } catch (e) {
      // 静默重试
    }
  }, 3000);
  $('#pollStatus').textContent = '(轮询中...)';
}

// ── 发送 ──
async function send() {
  const peer = $('#peerInput').value.trim();
  const text = $('#msgInput').value.trim();
  if (!peer || !text) return;

  const body = JSON.stringify({
    from_openid: state.openId,
    to_openid: peer,
    client_msg_id: `web_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
    content: JSON.stringify({ text, time: new Date().toISOString() })
  });

  try {
    const res = await fetch(`${L0}/messages`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${state.apiKey}`,
        'Content-Type': 'application/json'
      },
      body
    });
    const data = await res.json();
    if (data.code !== 0) throw new Error(data.msg);

    log(`📤 <b>${text.slice(0,100)}</b>`, 'sent');
    $('#msgInput').value = '';
  } catch (err) {
    log(`❌ 发送失败: ${err.message}`, 'sys');
  }
}

function clearLog() {
  $('#log').innerHTML = '<div class="log-entry log-sys">日志已清空</div>';
}

// ── 初始化 ──
$('#version').textContent = `v0.1 · ${new Date().toISOString().slice(0,10)}`;
log('🦞 OceanBus 浏览器客户端已就绪', 'sys');
log('点击上方按钮连接 OceanBus L0', 'sys');
</script>
</body>
</html>
